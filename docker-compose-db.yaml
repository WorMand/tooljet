name: tooljet-app

services:
  tooljet:
    image: tooljet/tooljet-ce:ce-lts-latest
    platform: linux/amd64
    restart: always
    environment:
      - SERVICE_FQDN_TOOLJET_80
      - TOOLJET_HOST=$SERVICE_URL_TOOLJET
      - SERVE_CLIENT=true
      - PORT=80
      - PG_HOST=postgresql
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASS=$SERVICE_PASSWORD_POSTGRES
      - PG_DB=tooljet_production
      - TOOLJET_DB=tooljet_db
      - TOOLJET_DB_USER=postgres
      - TOOLJET_DB_HOST=postgresql
      - TOOLJET_DB_PASS=$SERVICE_PASSWORD_POSTGRES
      - PGRST_JWT_SECRET=$SERVICE_PASSWORD_SECRET
      - SECRET_KEY_BASE=$SERVICE_PASSWORD_SECRET
      - LOCKBOX_MASTER_KEY=$SERVICE_PASSWORD_LOCKBOX
      - NODE_ENV=production
    depends_on:
      postgresql:
        condition: service_healthy
    command: npm run start:prod

  postgresql:
    image: postgres:16
    restart: always
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=$SERVICE_PASSWORD_POSTGRES
      - POSTGRES_DB=tooljet_production
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d tooljet_production
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  postgresql-data:
