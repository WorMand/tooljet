name: tooljet-app

services:
  tooljet:
    image: tooljet/tooljet-ce:ce-lts-latest
    platform: linux/amd64
    restart: always
    environment:
      - SERVICE_FQDN_TOOLJET_80
      - TOOLJET_HOST=$SERVICE_URL_TOOLJET
      - SERVE_CLIENT=true
      - PORT=80
      - PG_HOST=postgresql
      - PG_PORT=5432
      - PG_USER=$SERVICE_USER_POSTGRES
      - PG_PASS=$SERVICE_PASSWORD_POSTGRES
      - PG_DB=${POSTGRES_DB:-tooljet}
      - TOOLJET_DB_USER=$SERVICE_USER_POSTGRES      # ← PG_USER ile AYNI olmalı
      - TOOLJET_DB_PASS=$SERVICE_PASSWORD_POSTGRES  # ← PG_PASS ile AYNI olmalı
      - TOOLJET_DB_HOST=postgresql
      - TOOLJET_DB_PORT=5432
      - TOOLJET_DB=tooljet_db
      - PGRST_JWT_SECRET=$SERVICE_PASSWORD_SECRET
      - PGRST_HOST=postgrest                        # ← YENİ
      - PGRST_DB_URI=postgres://$SERVICE_USER_POSTGRES:$SERVICE_PASSWORD_POSTGRES@postgresql/tooljet_db  # ← YENİ
      - SECRET_KEY_BASE=$SERVICE_PASSWORD_SECRET
      - LOCKBOX_MASTER_KEY=$SERVICE_PASSWORD_LOCKBOX
      - ENABLE_TOOLJET_DB=false                     # ← TEKRAR false yap (en temiz çözüm)
      - NODE_ENV=production
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:80/ || exit 1
      interval: 10s
      timeout: 30s
      retries: 10
    command: npm run start:prod

  postgresql:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=$SERVICE_USER_POSTGRES
      - POSTGRES_PASSWORD=$SERVICE_PASSWORD_POSTGRES
      - POSTGRES_DB=${POSTGRES_DB:-tooljet}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  postgresql-data:
